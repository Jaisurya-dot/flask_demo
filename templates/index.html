{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Student Management</h2>

<a href="/add" class="btn btn-success mb-3">
Add Student
</a>

<table class="table table-bordered table-hover">

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Course</th>
<th>Action</th>

</tr>

{% for student in students %}

<tr>

<td>{{ student.id }}</td>
<td>{{ student.name }}</td>
<td>{{ student.email }}</td>
<td>{{ student.course }}</td>

<td>

<a href="/edit/{{ student.id }}"
class="btn btn-warning btn-sm">

Edit

</a>

<a href="/delete/{{ student.id }}"
class="btn btn-danger btn-sm">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
