{% extends 'base.html' %}

{% block content %}

<h2>Add Student</h2>

<form method="POST">

<input
class="form-control mb-3"
name="name"
placeholder="Name"
required>

<input
class="form-control mb-3"
name="email"
placeholder="Email"
required>

<input
class="form-control mb-3"
name="course"
placeholder="Course"
required>

<button class="btn btn-primary">

Save Student

</button>

<a href="/"
class="btn btn-secondary">

Back

</a>

</form>

{% endblock %}
